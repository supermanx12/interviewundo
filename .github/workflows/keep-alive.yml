name: Keep Backend Alive

# Runs every 14 minutes (Render free tier spins down after 15 min)
on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ping:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          echo "Pinging backend at $(date)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://interviewundo.onrender.com/health)
          echo "Response status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "⚠️ Warning: Health check returned status $STATUS"
            exit 1
          else
            echo "✅ Backend is alive!"
          fi
