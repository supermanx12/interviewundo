# ============================================================
# Nginx — Reverse Proxy Config for InterviewUndo Backend API
# File: /etc/nginx/sites-available/interviewundo-api
#
# This config:
#   1. Redirects HTTP → HTTPS
#   2. Proxies HTTPS → backend on localhost:4000
#   3. Handles Socket.IO WebSocket upgrades
#
# Setup commands (run on VPS after copying this file):
#   sudo ln -s /etc/nginx/sites-available/interviewundo-api \
#              /etc/nginx/sites-enabled/interviewundo-api
#   sudo nginx -t
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d api.interviewundo.com
# ============================================================

# ----------------------------------------------------------
# HTTP → HTTPS Redirect
# ----------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.interviewundo.com;

    # Let's Encrypt challenge (certbot manages this automatically)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------
# HTTPS — Reverse Proxy to Backend
# ----------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.interviewundo.com;

    # SSL certificates (managed by Certbot — do not edit manually)
    ssl_certificate     /etc/letsencrypt/live/api.interviewundo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.interviewundo.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (for any file uploads to backend)
    client_max_body_size 10M;

    # ----------------------------------------------------------
    # Socket.IO — WebSocket + Long-polling proxy
    # Must be before the general location block
    # ----------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — keep long-lived connections alive
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 60s;
    }

    # ----------------------------------------------------------
    # General API Proxy
    # ----------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (fallback)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 30s;
    }
}
