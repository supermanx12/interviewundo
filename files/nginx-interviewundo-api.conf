# ============================================================
# Nginx — Reverse Proxy Config for InterviewUndo Backend API
# File: /etc/nginx/sites-available/interviewundo-api
#
# Domain: api-200-97-160-24.sslip.io (free sslip.io — no DNS setup needed)
#
# Setup commands (run on VPS):
#   cp /var/www/interview-undo/files/nginx-interviewundo-api.conf \
#      /etc/nginx/sites-available/interviewundo-api
#   ln -s /etc/nginx/sites-available/interviewundo-api \
#         /etc/nginx/sites-enabled/interviewundo-api
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d api-200-97-160-24.sslip.io
# ============================================================

# ----------------------------------------------------------
# HTTP → HTTPS Redirect
# ----------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api-200-97-160-24.sslip.io;

    # Let's Encrypt challenge (certbot manages this automatically)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------
# HTTPS — Reverse Proxy to Backend
# ----------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api-200-97-160-24.sslip.io;

    # SSL certificates (managed by Certbot — do not edit manually)
    ssl_certificate     /etc/letsencrypt/live/api-200-97-160-24.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-200-97-160-24.sslip.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size
    client_max_body_size 10M;

    # ----------------------------------------------------------
    # Socket.IO — WebSocket + Long-polling proxy
    # Must be before the general location block
    # ----------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — keep long-lived connections alive
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 60s;
    }

    # ----------------------------------------------------------
    # General API Proxy
    # ----------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (fallback)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 30s;
    }
}
